<!--registration from section-->
<section class="form-section">
    <div class="form-container">
        <h2>Register New Employee</h2>
        <form class="registration-from">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="fullname" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email " required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <select id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option value="cleaner">Cleaner</option>
                    <option value="security">Security</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>
            <div class="form-group">
                <label for="position">Position</label>
                <select id="position" name="position" required>
                    <option value="">Select your position</option>
                    <option value="worker">Worker</option>
                    <option value="Team leader">Team Leader</option>
                    <option value="supervisor">Supervisor</option>
                </select>
            </div>
            <div class="form-group">
                <label for="startdate">Start Date</label>
                <input type="date" id="startdate" name="start date" required>
            </div>
            <button type="submit" class="btn btn-primary">Register Employee</button>
        </form>
    </div>
</section>
